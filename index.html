<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>超级个体探索中 - 个人导航页</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-400 via-purple-300 to-pink-200">
    <main class="w-full max-w-md mx-auto bg-white bg-opacity-70 rounded-2xl shadow-xl p-8 flex flex-col items-center space-y-6 backdrop-blur-sm">
      <!-- 占位头像 -->
      <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-purple-400 to-indigo-400 flex items-center justify-center shadow-md">
        <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 48 48">
          <circle cx="24" cy="18" r="9" />
          <path d="M8 40c0-7 8-11 16-11s16 4 16 11" />
        </svg>
      </div>
      <!-- 名字 -->
      <h1 class="text-2xl font-bold text-gray-900">Chase的超级个体探索中</h1>
      <!-- 简介 -->
      <p class="text-gray-600 text-center">这是我的 AI 编程学习项目...</p>

      <!-- 按钮区 -->
      <div class="w-full flex flex-col space-y-4 mt-4">
        <a href="javascript:void(0);" class="flex items-center justify-center px-6 py-3 rounded-xl bg-gradient-to-r from-green-400 to-teal-400 text-white font-semibold shadow-md hover:from-green-500 hover:to-teal-500 transition duration-150">
          <svg class="w-6 h-6 mr-2" viewBox="0 0 1024 1024" fill="currentColor">
            <circle cx="512" cy="512" r="512" fill="#fff" opacity="0.15"/>
            <path d="M512 130C317 130 158 255 158 416c0 84 62 161 160 206v83c0 16 13 29 29 29 6 0 12-2 17-5l93-66c17 2 34 3 55 3 195 0 354-125 354-276S707 130 512 130z" fill="#27C13D"/>
          </svg>
          微信
        </a>
        <a href="https://web.okjike.com/" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center px-6 py-3 rounded-xl bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-semibold shadow-md hover:from-yellow-500 hover:to-orange-500 transition duration-150">
          <svg class="w-6 h-6 mr-2" fill="none" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="12" fill="#FFC312"/>
            <path d="M6.65 13.1a6 6 0 0 1 10.72 0c.8 1.53-.43 3.39-2.27 3.39h-6.2c-1.84 0-3.07-1.86-2.25-3.39z" fill="#fff"/>
            <circle cx="9" cy="12" r="1" fill="#555"/>
            <circle cx="15" cy="12" r="1" fill="#555"/>
          </svg>
          即刻
        </a>
        <a href="https://github.com/" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center px-6 py-3 rounded-xl bg-gradient-to-r from-gray-700 to-gray-900 text-white font-semibold shadow-md hover:from-gray-800 hover:to-black transition duration-150">
          <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12 2C6.475 2 2 6.475 2 12c0 4.418 2.865 8.166 6.839 9.489.5.091.682-.217.682-.482 0-.238-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.153-1.110-1.461-1.110-1.461-.908-.62.069-.608.069-.608 1.004.07 1.533 1.033 1.533 1.033.892 1.528 2.341 1.087 2.91.832.091-.647.35-1.087.636-1.338-2.22-.252-4.555-1.112-4.555-4.942 0-1.090.39-1.982 1.029-2.681-.103-.253-.446-1.269.098-2.648 0 0 .84-.27 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.704.115 2.503.337 1.91-1.296 2.75-1.025 2.75-1.025.545 1.379.202 2.395.1 2.648.64.699 1.028 1.591 1.028 2.681 0 3.84-2.338 4.687-4.566 4.935.359.309.679.919.679 1.854 0 1.338-.013 2.419-.013 2.75 0 .267.18.577.688.48C19.138 20.162 22 16.416 22 12c0-5.525-4.475-10-10-10z" />
          </svg>
          GitHub
        </a>
        <input
          id="user-name-input"
          type="text"
          placeholder="请输入您的尊姓大名"
          class="w-full mb-4 px-4 py-3 rounded-xl border border-gray-300 bg-white/90 text-gray-800 placeholder-gray-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition"
        />
        <button id="quote-btn" class="px-6 py-3 rounded-xl bg-blue-500 text-white font-semibold shadow-md hover:bg-blue-600 transition duration-150">
          获取今日专属名言
        </button>
        <p id="quote-display" class="text-center text-gray-500 italic">
          <!-- 这里用来展示名言 -->
        </p>
      </div>
    </main>
    <script>
      const quoteBtn = document.getElementById("quote-btn");
      const quoteDisplay = document.getElementById("quote-display");
      const userNameInput = document.getElementById("user-name-input");
      const webhookBaseUrl =
        "https://washing-acquisitions-against-excellence.trycloudflare.com/webhook-test/ff4bbd17-0443-4c21-8485-7782421cdfa8";

      quoteBtn.addEventListener("click", async () => {
        const name = userNameInput.value === "" ? "神秘访客" : userNameInput.value;

        quoteBtn.textContent = "正在呼叫工厂...";
        quoteBtn.disabled = true;

        try {
          const response = await fetch(webhookBaseUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ name }),
          });
          if (!response.ok) {
            throw new Error("Request failed");
          }

          const data = await response.json();
          quoteDisplay.textContent = data.my_daily_quote || "今日暂无名言返回";
        } catch (error) {
          quoteDisplay.textContent = "呼叫失败，请检查 n8n 工厂是否已通电";
        } finally {
          quoteBtn.textContent = "获取今日专属名言";
          quoteBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
